chartConfig:
  config: null
  type: table
contentType: chart
description: >-
  Tests timestamp operators: EQUALS, GREATER_THAN, IN_THE_PAST (hours),
  IN_THE_CURRENT
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions:
    - subscriptions_subscription_start_day
  exploreName: subscriptions
  filters:
    dimensions:
      and:
        - id: "1"
          operator: equals
          target:
            fieldId: subscriptions_subscription_start_day
          values:
            - "2024-06-15T10:30:00Z"
        - id: "2"
          operator: greaterThan
          target:
            fieldId: subscriptions_subscription_start_day
          values:
            - "2024-01-01T00:00:00Z"
        - id: "3"
          operator: inThePast
          settings:
            completed: false
            unitOfTime: hours
          target:
            fieldId: subscriptions_subscription_start_day
          values:
            - 24
        - id: "4"
          operator: inTheCurrent
          settings:
            unitOfTime: months
          target:
            fieldId: subscriptions_subscription_start_month
          values:
            - 1
      id: timestamp-all
  limit: 500
  metricOverrides: {}
  metrics:
    - subscriptions_total_subscriptions
  sorts:
    - descending: false
      fieldId: subscriptions_subscription_start_day
  tableCalculations: []
name: "[Filter Test] Timestamp - All Operators"
slug: filter-test-timestamp-all-operators
spaceSlug: test-sql-generation/filters
tableConfig:
  columnOrder:
    - subscriptions_subscription_start_day
    - subscriptions_total_subscriptions
tableName: subscriptions
verification: null
version: 1
