chartConfig:
  config: null
  type: table
contentType: chart
description: Tests combination of string, number, date, boolean filters
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions:
    - orders_status
    - orders_order_date_month
  exploreName: orders
  filters:
    dimensions:
      and:
        - id: "1"
          operator: equals
          target:
            fieldId: orders_status
          values:
            - completed
            - shipped
        - id: "2"
          operator: startsWith
          target:
            fieldId: orders_shipping_method
          values:
            - sta
        - id: "3"
          operator: greaterThan
          target:
            fieldId: orders_amount
          values:
            - 50
        - id: "4"
          operator: inBetween
          target:
            fieldId: orders_shipping_cost
          values:
            - 5
            - 30
        - id: "5"
          operator: inThePast
          settings:
            completed: false
            unitOfTime: months
          target:
            fieldId: orders_order_date_month
          values:
            - 12
        - id: "6"
          operator: equals
          target:
            fieldId: orders_is_completed
          values:
            - true
      id: mixed-all
  limit: 500
  metricOverrides: {}
  metrics:
    - orders_unique_order_count
    - orders_total_order_amount
  sorts:
    - descending: false
      fieldId: orders_order_date_month
  tableCalculations: []
name: "[Filter Test] Mixed - All Types"
slug: filter-test-mixed-all-types
spaceSlug: test-sql-generation/filters
tableConfig:
  columnOrder:
    - orders_status
    - orders_order_date_month
    - orders_unique_order_count
    - orders_total_order_amount
tableName: orders
verification: null
version: 1
