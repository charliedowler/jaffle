chartConfig:
  config: null
  type: table
contentType: chart
description: Tests OR group with AND subgroups for nested logic
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions:
    - orders_status
    - orders_order_date_day
  exploreName: orders
  filters:
    dimensions:
      id: nested-logic
      or:
        - and:
            - id: 1a
              operator: equals
              target:
                fieldId: orders_is_completed
              values:
                - true
            - id: 1b
              operator: greaterThan
              target:
                fieldId: orders_amount
              values:
                - 200
          id: group-1
        - and:
            - id: 2a
              operator: equals
              target:
                fieldId: orders_is_completed
              values:
                - false
            - id: 2b
              operator: inThePast
              settings:
                unitOfTime: days
              target:
                fieldId: orders_order_date_day
              values:
                - 7
          id: group-2
  limit: 500
  metricOverrides: {}
  metrics:
    - orders_unique_order_count
    - orders_total_order_amount
  sorts:
    - descending: false
      fieldId: orders_order_date_day
  tableCalculations: []
name: "[Filter Test] Nested Logic"
slug: filter-test-nested-logic
spaceSlug: test-sql-generation/filters
tableConfig:
  columnOrder:
    - orders_status
    - orders_order_date_day
    - orders_unique_order_count
    - orders_total_order_amount
tableName: orders
verification: null
version: 1
