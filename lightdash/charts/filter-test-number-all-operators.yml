chartConfig:
  config: null
  type: table
contentType: chart
description: >-
  Tests all number filter operators: EQUALS, NOT_EQUALS, LESS_THAN,
  LESS_THAN_OR_EQUAL, GREATER_THAN, GREATER_THAN_OR_EQUAL, IN_BETWEEN,
  NOT_IN_BETWEEN
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions:
    - orders_order_id
  exploreName: orders
  filters:
    dimensions:
      and:
        - id: "1"
          operator: equals
          target:
            fieldId: orders_estimated_delivery_days
          values:
            - 3
        - id: "2"
          operator: notEquals
          target:
            fieldId: orders_customer_id
          values:
            - 1
        - id: "3"
          operator: lessThan
          target:
            fieldId: orders_amount
          values:
            - 500
        - id: "4"
          operator: lessThanOrEqual
          target:
            fieldId: orders_shipping_cost
          values:
            - 25
        - id: "5"
          operator: greaterThan
          target:
            fieldId: orders_tax_rate
          values:
            - 0.05
        - id: "6"
          operator: greaterThanOrEqual
          target:
            fieldId: orders_order_id
          values:
            - 10
        - id: "7"
          operator: inBetween
          target:
            fieldId: orders_amount
          values:
            - 50
            - 200
        - id: "8"
          operator: notInBetween
          target:
            fieldId: orders_shipping_cost
          values:
            - 0
            - 5
      id: number-all
  limit: 500
  metricOverrides: {}
  metrics:
    - orders_total_order_amount
  sorts:
    - descending: false
      fieldId: orders_order_id
  tableCalculations: []
name: "[Filter Test] Number - All Operators"
slug: filter-test-number-all-operators
spaceSlug: test-sql-generation/filters
tableConfig:
  columnOrder:
    - orders_order_id
    - orders_total_order_amount
tableName: orders
verification: null
version: 1
