chartConfig:
  config: null
  type: table
contentType: chart
description: >-
  Tests all string filter operators: EQUALS (single/multi), NOT_EQUALS,
  STARTS_WITH, ENDS_WITH, INCLUDE, NOT_INCLUDE
metricQuery:
  additionalMetrics: []
  customDimensions: []
  dimensionOverrides: {}
  dimensions:
    - orders_status
  exploreName: orders
  filters:
    dimensions:
      and:
        - id: "1"
          operator: equals
          target:
            fieldId: orders_status
          values:
            - completed
        - id: "2"
          operator: equals
          target:
            fieldId: orders_order_source
          values:
            - website
            - mobile_app
        - id: "3"
          operator: notEquals
          target:
            fieldId: orders_shipping_method
          values:
            - overnight
        - id: "4"
          operator: notEquals
          target:
            fieldId: orders_order_priority
          values:
            - urgent
            - high
        - id: "5"
          operator: startsWith
          target:
            fieldId: orders_currency
          values:
            - US
        - id: "6"
          operator: endsWith
          target:
            fieldId: orders_fulfillment_center
          values:
            - coast
        - id: "7"
          operator: include
          target:
            fieldId: orders_promo_code
          values:
            - SALE
        - id: "8"
          operator: doesNotInclude
          target:
            fieldId: orders_order_notes
          values:
            - urgent
      id: string-all
  limit: 500
  metricOverrides: {}
  metrics:
    - orders_unique_order_count
  sorts:
    - descending: false
      fieldId: orders_status
  tableCalculations: []
name: "[Filter Test] String - All Operators"
slug: filter-test-string-all-operators
spaceSlug: test-sql-generation/filters
tableConfig:
  columnOrder:
    - orders_status
    - orders_unique_order_count
tableName: orders
verification: null
version: 1
