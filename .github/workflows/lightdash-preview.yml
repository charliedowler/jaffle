name: Lightdash Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: lightdash-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lightdash-preview-deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Lightdash Preview
        uses: lightdash/lightdash-preview-action@v1
        with:
          lightdash_url: ${{ secrets.LIGHTDASH_URL }}
          lightdash_api_key: ${{ secrets.LIGHTDASH_API_KEY }}
          project_uuid: ${{ secrets.LIGHTDASH_PROJECT_UUID }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  lightdash-preview-destroy:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Destroy Lightdash Preview
        uses: lightdash/lightdash-preview-action@v1
        with:
          lightdash_url: ${{ secrets.LIGHTDASH_URL }}
          lightdash_api_key: ${{ secrets.LIGHTDASH_API_KEY }}
          project_uuid: ${{ secrets.LIGHTDASH_PROJECT_UUID }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          action: destroy
