version: 2
models:
  - name: plan
    description: "Subscription plan definitions including plan name and metadata."
    config:
      tags: ["core", "ai"]
    meta:
      primary_key: id
      required_attributes:
        is_admin: "true"
    columns:
      - name: id
        description: "Unique identifier for the plan."
      - name: plan_name
        description: "Name of the subscription plan."
      - name: metadata
        description: "JSON metadata associated with the plan."
        meta:
          additional_dimensions:
            created_by:
              type: string
              sql: ${plan.metadata}->>'created_by'
            created_by_first_name:
              type: string
              sql: SPLIT_PART(${created_by}, ' ', 1)
            created_by_last_name:
              type: string
              sql: SPLIT_PART(${created_by}, ' ', 2)
          metrics:
            creator_count:
              type: count
              sql: ${created_by}
