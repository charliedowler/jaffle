version: 2
models:
  - name: fanouts_tracks
    description: "User event tracks associated with fanout users, used to demonstrate chained join fanout."
    meta:
      required_attributes:
        is_admin_saas_demo: "true"
      primary_key: event_id
    columns:
      - name: user_id
        description: "Links to the users table"
        meta:
          dimension:
            type: string
      - name: event_id
        description: "Unique identifier for the track event."
        meta:
          dimension:
            type: string
          metrics:
            unique_event_count:
              type: count_distinct
              label: "✅ FANOUT SAFE Unique Event Count"
              description: "✅ CORRECT: Uses count_distinct so won't inflate"
            event_count:
              type: count
      - name: event_name
        description: "Name of the tracked event."
        meta:
          dimension:
            type: string
      - name: timestamp
        description: "Timestamp when the event was recorded."
        meta:
          dimension:
            type: timestamp
