version: 2
models:
  - name: geo
    description: "Geographic reference data with coordinates, country codes, and sales metrics for map visualizations."
    columns:
      - name: id
        description: "Unique row identifier."
        config:
          meta:
            dimension:
              type: number
      - name: continent
        description: "Continent name."
        config:
          meta:
            dimension:
              type: string
      - name: country_name
        description: "Full country name."
        config:
          meta:
            dimension:
              type: string
      - name: country_code_2_digit
        description: "ISO 3166-1 alpha-2 country code (e.g., US, GB, DE)"
        config:
          meta:
            dimension:
              type: string
      - name: country_code_3_digit
        description: "ISO 3166-1 alpha-3 country code (e.g., USA, GBR, DEU) - matches countries.geojson"
        config:
          meta:
            dimension:
              type: string
      - name: state_province_name
        description: "State or province name."
        config:
          meta:
            dimension:
              type: string
      - name: us_state_code
        description: "US state abbreviation code."
        config:
          meta:
            dimension:
              type: string
      - name: postal_code
        description: "Postal or ZIP code."
        config:
          meta:
            dimension:
              type: string
      - name: latitude
        description: "Latitude coordinate."
        config:
          meta:
            dimension:
              type: number
      - name: longitude
        description: "Longitude coordinate."
        config:
          meta:
            dimension:
              type: number
      - name: sales_volume_usd
        description: "Sales volume in USD."
        config:
          meta:
            dimension:
              type: number
            metrics:
              sales_volume_sum:
                type: sum
      - name: customer_count
        description: "Number of customers."
        config:
          meta:
            dimension:
              type: number
            metrics:
              customer_count_sum:
                type: sum
      - name: avg_transaction_value_usd
        description: "Average transaction value in USD."
        config:
          meta:
            dimension:
              type: number
              hidden: true
      - name: custom_geo_area
        description: "Custom geographic area grouping."
        config:
          meta:
            dimension:
              type: string
      - name: geo_json_reference_key
        description: "Reference key for GeoJSON map matching."
        config:
          meta:
            dimension:
              type: string
