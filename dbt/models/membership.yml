version: 2
models:
  - name: membership
    description: "Customer membership records linking customers to their subscription plans."
    config:
      tags: ["core", "ai"]
    meta:
      primary_key: id
      required_attributes:
        is_admin: "true"
      joins:
        - join: plan
          sql_on: ${membership.plan_id} = ${plan.id}
          relationship: many-to-one
    columns:
      - name: id
        description: "Unique identifier for the membership record."
      - name: customer_id
        description: "Foreign key referencing the customer."
      - name: plan_id
        description: "Foreign key referencing the subscription plan."
