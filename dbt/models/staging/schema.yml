version: 2
models:
  - name: stg_customers
    description: "Staged customer records sourced from the raw customers table, with minimal transformations."
    meta:
      group_label: "staging"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
        description: "Unique identifier for the customer."
      - name: first_name
        description: "Customer's first name."
      - name: last_name
        description: "Customer's last name."
      - name: created
        description: "Timestamp when the customer record was created."
  - name: stg_orders
    description: "Staged order records sourced from the raw orders table, with status casting and basic cleaning."
    meta:
      group_label: "staging"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
        description: "Unique identifier for the order."
        meta:
          dimension:
            type: number
      - name: status
        tests:
          - accepted_values:
              values:
                - placed
                - shipped
                - completed
                - return_pending
                - returned
        description: "Fulfillment status of the order."
        meta:
          dimension:
            type: string
      - name: customer_id
        description: "Foreign key referencing the customer who placed the order."
        meta:
          dimension:
            type: number
      - name: order_date
        description: "Date the order was placed."
        meta:
          dimension:
            type: date
  - name: stg_payments
    description: "Staged payment records sourced from the raw payments table, with amount conversion and method casting."
    meta:
      group_label: "staging"
    columns:
      - name: payment_id
        tests:
          - unique
          - not_null
        description: "Unique identifier for the payment."
      - name: payment_method
        tests:
          - accepted_values:
              values:
                - credit_card
                - coupon
                - bank_transfer
                - gift_card
        description: "Method used for the payment (e.g. credit_card, coupon, bank_transfer, gift_card)."
      - name: order_id
        description: "Foreign key referencing the order this payment belongs to."
      - name: amount
        description: "Payment amount in dollars (converted from cents)."

  # Health staging models
  - name: stg_patients
    description: Cleaned patient demographic and registration information
    meta:
      group_label: "staging"
    columns:
      - name: patient_id
        description: Unique patient identifier
        tests:
          - unique
          - not_null
      - name: full_name
        description: Patient's full name
      - name: age
        description: Patient's current age in years
      - name: email
        description: Patient email address
      - name: health_plan
        description: Patient's health insurance plan
      - name: risk_category
        description: Patient risk stratification (Low, Medium, High)

  - name: stg_health_visits
    description: Cleaned healthcare visits and encounters
    meta:
      group_label: "staging"
    columns:
      - name: visit_id
        description: Unique visit identifier
        tests:
          - unique
          - not_null
      - name: patient_id
        description: Reference to patient
        tests:
          - not_null
      - name: visit_date
        description: Date of the healthcare visit
      - name: visit_type
        description: Type of visit (Annual Checkup, Sick Visit, etc.)
      - name: provider
        description: Healthcare provider who conducted the visit

  - name: stg_health_vitals
    description: Cleaned vital signs measurements from visits
    meta:
      group_label: "staging"
    columns:
      - name: vital_id
        description: Unique vital measurement identifier
        tests:
          - unique
          - not_null
      - name: visit_id
        description: Reference to visit
        tests:
          - not_null
      - name: blood_pressure_category
        description: BP classification (Normal, Elevated, etc.)
      - name: bmi_category
        description: BMI classification (Underweight, Normal, etc.)

  - name: stg_health_conditions
    description: Cleaned patient diagnoses and conditions
    meta:
      group_label: "staging"
    columns:
      - name: condition_id
        description: Unique condition identifier
        tests:
          - unique
          - not_null
      - name: patient_id
        description: Reference to patient
        tests:
          - not_null
      - name: condition_name
        description: Name of the medical condition
      - name: condition_category
        description: Category of condition (Endocrine, Cardiovascular, etc.)
      - name: chronic
        description: Whether condition is chronic

  - name: stg_regional_sales
    description: Cleaned regional sales data
    meta:
      group_label: "staging"
    columns:
      - name: sale_id
        description: Unique sale identifier
        tests:
          - unique
          - not_null
      - name: sale_date
        description: Date of the sale
      - name: region
        description: Sales region
      - name: product_category
        description: Product category
      - name: units_sold
        description: Number of units sold
      - name: revenue
        description: Sale revenue amount
      - name: customer_id
        description: Reference to customer

  # Facilities Management staging models - all prefixed with stg_fm_
  - name: stg_fm_work_orders
